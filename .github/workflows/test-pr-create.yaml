name: Test PR creation

on:
  - push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: folio-org
          repositories: mod-fqm-manager

      - uses: actions/checkout@v4
        with:
          repository: folio-org/mod-fqm-manager
          token: ${{ steps.generate-token.outputs.token }}

      - run: echo test `date` > test.txt
      - run: echo 'i was here!' >> README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          branch: autogen-staging-nondraft
          # draft: true
          labels: ✨autogenerated✨

      - run: echo test `date` draft > test.txt
      - run: echo 'i was here!' draft >> README.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        id: create-pr-draft
        with:
          token: ${{ steps.generate-token.outputs.token }}
          sign-commits: true
          branch: autogen-staging
          draft: true
          labels: ✨autogenerated✨

      - name: Enable Pull Request Automerge
        run: gh pr merge --merge --auto --repo folio-org/mod-fqm-manager "${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
